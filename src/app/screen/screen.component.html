@if (screen(); as currentScreen) {
  <div class="screen">
    @if (currentScreen.type === 'image') {
      <div class="media-frame">
        <img
          class="media"
          [src]="assetUrl()"
          [alt]="currentScreen.alt ?? currentScreen.slug"
          decoding="async"
          fetchpriority="high"
        />
        @if (currentScreen.hotspot; as hotspot) {
          <a
            class="media-hotspot"
            [href]="hotspot.url"
            target="_blank"
            rel="noopener noreferrer"
            [attr.aria-label]="hotspot.label ?? 'Enlace'"
            [style.top]="hotspot.top"
            [style.left]="hotspot.left"
            [style.width]="hotspot.width"
            [style.height]="hotspot.height"
          ></a>
        }
      </div>
    } @else if (currentScreen.type === 'video') {
      <video
        class="media"
        [src]="assetUrl()"
        [poster]="posterUrl()"
        controls
        playsinline
        preload="none"
      ></video>
    } @else {
      <div class="audio-player">
        <audio
          #audio
          class="audio-player__element"
          [src]="assetUrl()"
          preload="none"
          (contextmenu)="$event.preventDefault()"
          (play)="onAudioPlayState(true)"
          (pause)="onAudioPlayState(false)"
          (ended)="onAudioPlayState(false)"
        ></audio>
        <button
          type="button"
          class="audio-player__button"
          (click)="toggleAudio(audio)"
        >
          {{ isAudioPlaying() ? 'Pausar' : 'Reproducir' }}
        </button>
      </div>
    }
  </div>
} @else {
  <div class="screen">
    <p class="message">Screen not found</p>
  </div>
}
